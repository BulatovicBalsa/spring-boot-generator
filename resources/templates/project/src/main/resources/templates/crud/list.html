<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${entityName} + ' list'">List</title>
    <style>
        body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; color: #1f2937; }
        h1 { margin-bottom: 16px; }
        .toolbar { margin-bottom: 12px; }
        .btn { display: inline-block; padding: 8px 12px; text-decoration: none; background: #2563eb; color: white; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px 12px; border: 1px solid #e5e7eb; text-align: left; }
        th { background: #f9fafb; font-weight: 600; }
        tr:hover { background: #f8fafc; }
        .muted { color: #6b7280; }
        .count-badge {
            display: inline-block; background: #e5e7eb;
            color: #374151; border-radius: 12px;
            padding: 1px 8px; font-size: 12px;
        }
    </style>
</head>
<body>
<h1 th:text="${entityName} + ' list'">List</h1>

<p class="muted" style="color: #166534;" th:if="${flashMessage}" th:text="${flashMessage}">Saved.</p>
<p class="muted" style="color: #b91c1c;" th:if="${flashError}" th:text="${flashError}">Error.</p>

<div class="toolbar">
    <a class="btn" th:href="${basePath + '/new'}">New</a>
    <a class="btn" th:href="${basePath}">Refresh</a>
</div>

<p class="muted" th:if="${#lists.isEmpty(tableRows)}">No data available.</p>

<table th:if="${!#lists.isEmpty(tableRows)}">
    <thead>
    <tr>
        <th th:each="col : ${columns}" th:text="${col}">column</th>
        <th>actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${tableRows}">
        <td th:each="cell : ${row['cells']}">
            <span th:if="${cell != null and cell.toString().startsWith('Count:')}"
                  class="count-badge"
                  th:text="${cell}">
            </span>

            <span th:if="${cell == null or !cell.toString().startsWith('Count:')}"
                  th:text="${cell} ?: '-'">
            </span>
        </td>
        <td>
            <a th:if="${row['id'] != null}" th:href="${basePath + '/' + row['id']}">details</a>
            <span th:if="${row['id'] != null}"> | </span>
            <a th:if="${row['id'] != null}" th:href="${basePath + '/' + row['id'] + '/edit'}">edit</a>
            <span th:if="${row['id'] != null}"> | </span>
            <form th:if="${row['id'] != null}"
                  th:action="${basePath + '/' + row['id'] + '/delete'}"
                  method="post"
                  style="display: inline;">
                <button type="submit"
                        style="background: none; border: none; color: #b91c1c; cursor: pointer; padding: 0;"
                        onclick="return confirm('Delete this item?');">delete</button>
            </form>
            <span th:if="${row['id'] == null}" class="muted">n/a</span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
