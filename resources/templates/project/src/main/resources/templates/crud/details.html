<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${entityName} + ' details'">Details</title>
    <style>
        body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; color: #1f2937; }
        h1 { margin-bottom: 16px; }
        .card { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; background: white; }
        .row { display: grid; grid-template-columns: 180px 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
        .row:last-child { border-bottom: 0; }
        .k { color: #6b7280; font-weight: 600; }
        .v { word-break: break-word; }
        .actions { margin-top: 14px; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
<h1 th:text="${entityName} + ' details'">Details</h1>

<div class="card">
    <div class="row" th:each="entryItem : ${entry.entrySet()}">
        <div class="k" th:text="${entryItem.key}">key</div>
        <div class="v" th:text="${entryItem.value} ?: '-'">value</div>
    </div>
</div>

<p class="actions">
    <a th:href="${basePath + '/' + entry['id'] + '/edit'}">Edit</a>
    <span> | </span>
    <a th:href="${basePath}">Back</a>
</p>
</body>
</html>
